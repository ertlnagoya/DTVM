  build_test_evm_state_roundtrip_x86:
    name: Test DTVM-EVM state roundtrip on x86-64
    if: github.event_name != 'workflow_dispatch' || inputs.job_scope == 'all'
    runs-on: ubuntu-latest
    container:
      image: dtvmdev1/dtvm-dev-x64:main
    steps:
      - name: Check out code
        run: |
          git config --global --add safe.directory "$PWD"
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
          git submodule update --init --recursive
      - name: Code Format Check
        run: |
          ./tools/format.sh check
      - name: Build and Run state roundtrip and host gas settlement tests
        run: |
          export LLVM_SYS_150_PREFIX=/opt/llvm15
          export LLVM_DIR=$LLVM_SYS_150_PREFIX/lib/cmake/llvm
          export PATH=$LLVM_SYS_150_PREFIX/bin:$PATH

          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DZEN_ENABLE_ASAN=ON \
            -DZEN_ENABLE_SPEC_TEST=ON \
            -DZEN_ENABLE_EVM=ON \
            -DZEN_ENABLE_CPU_EXCEPTION=OFF \
            -DZEN_ENABLE_SINGLEPASS_JIT=OFF \
            -DZEN_ENABLE_MULTIPASS_JIT=OFF

          cmake --build build -j 16 --target solidityContractTests evmHostTests

          ./build/solidityContractTests \
            --gtest_filter=SolidityStatePersistence.SaveLoadRoundTripPreservesContractState \
            --log-level error \
            --mode interpreter \
            --format evm

          ./build/evmHostTests --gtest_brief=1

  build_test_evm_call_semantics_x86:
    name: Test DTVM-EVM call semantics regressions on x86-64
