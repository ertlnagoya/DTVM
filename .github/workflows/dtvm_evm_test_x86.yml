          export PATH=$LLVM_SYS_150_PREFIX/bin:$PATH
          export CMAKE_BUILD_TARGET=Debug
          export ENABLE_ASAN=true
          export RUN_MODE=interpreter
          export INPUT_FORMAT=evm
          export ENABLE_LAZY=true
          export ENABLE_MULTITHREAD=true
          export TestSuite=evmfocusedregressions
          export CPU_EXCEPTION_TYPE='check'
          export ENABLE_GAS_METER=false
          export DTVM_TEST_REVISION=ALL
          export EVM_GTEST_FILTER='EVMStateFocused.ReentrancySelfdestructRevertCallCancun:EVMStateFocused.ReentrancySelfdestructRevertDelegatecallCancun:EVMStateFocused.WarmCoinbaseCallSufficientGasShanghai:EVMStateFocused.WarmCoinbaseDelegatecallSufficientGasShanghai:EVMStateFocused.WarmCoinbaseStaticcallSufficientGasShanghai'

          bash .ci/run_test_suite.sh

  build_test_evm_state_revision_subset_x86:
    name: Test DTVM-EVM state revision subset on x86-64 (${{ matrix.revision }})
    if: github.event_name == 'workflow_dispatch' && inputs.job_scope == 'all'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        revision: [Cancun, Shanghai, Berlin]
    container:
      image: dtvmdev1/dtvm-dev-x64:main
    steps:
      - name: Check out code
