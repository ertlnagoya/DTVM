name: DTVM-EVM test CI in x86-64

on:
  push:
    paths-ignore:
      - 'docs/**'
      - 'resources/**'
      - '*.md'
      - '.gitignore'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'resources/**'
      - '*.md'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      job_scope:
        description: "Manual run scope"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - focused_regressions
      focused_revision:
        description: "Revision for focused regressions"
        required: true
        default: "ALL"
        type: choice
        options:
          - ALL
          - Berlin
          - Prague
permissions:
    contents: read

jobs:
  build_test_evm_state_cancun_subset_x86:
    name: Test DTVM-EVM Cancun parameterized subset on x86-64
    if: github.event_name != 'workflow_dispatch' || inputs.job_scope == 'all'
    runs-on: ubuntu-latest
    container:
      image: dtvmdev1/dtvm-dev-x64:main
    steps:
      - name: Check out code
        run: |
          git config --global --add safe.directory "$PWD"
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
          git submodule update --init --recursive
      - name: Code Format Check
        run: |
          ./tools/format.sh check
      - name: Build and Run Cancun parameterized subset
        run: |
          echo "current home is $HOME"
          export LLVM_SYS_150_PREFIX=/opt/llvm15
          export LLVM_DIR=$LLVM_SYS_150_PREFIX/lib/cmake/llvm
          export PATH=$LLVM_SYS_150_PREFIX/bin:$PATH
          export CMAKE_BUILD_TARGET=Debug
          export ENABLE_ASAN=true
          export RUN_MODE=interpreter
          export INPUT_FORMAT=evm
          export ENABLE_LAZY=true
          export ENABLE_MULTITHREAD=true
          export TestSuite=evmstatesubset
          export CPU_EXCEPTION_TYPE='check'
          export ENABLE_GAS_METER=false
          export DTVM_TEST_REVISION=Cancun
          export EVM_GTEST_FILTER='ExecuteAllStateTests/*'

          bash .ci/run_test_suite.sh

  build_test_evm_state_shanghai_subset_x86:
    name: Test DTVM-EVM Shanghai parameterized subset on x86-64
    if: github.event_name != 'workflow_dispatch' || inputs.job_scope == 'all'
    runs-on: ubuntu-latest
    container:
      image: dtvmdev1/dtvm-dev-x64:main
    steps:
      - name: Check out code
        run: |
          git config --global --add safe.directory "$PWD"
          git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD
          git submodule update --init --recursive
      - name: Code Format Check
        run: |
