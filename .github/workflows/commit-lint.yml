name: Commit Lint

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - '**'

jobs:
  commitlint:
    name: Lint Commit Messages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch origin
          git fetch origin "${{ github.sha }}"
          git checkout --detach FETCH_HEAD

      - name: Lint commit messages
        run: |
          lint_range() {
            local from="$1"
            local to="$2"
            local failed=0

            while IFS= read -r line; do
              local sha="${line%% *}"
              local subject="${line#* }"
              local length="${#subject}"

              if [ -z "${subject// }" ]; then
                echo "::error::Commit $sha has an empty subject"
                failed=1
                continue
              fi

              if [ "$length" -gt 100 ]; then
                echo "::error::Commit $sha subject is longer than 100 characters"
                failed=1
              fi
            done < <(git log --format='%H %s' "${from}..${to}")

            return "$failed"
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ -n "${{ github.event.pull_request.base.sha }}" ] && [ -n "${{ github.event.pull_request.head.sha }}" ]; then
              echo "Linting PR commits from ${{ github.event.pull_request.base.sha }} to ${{ github.event.pull_request.head.sha }}"
              lint_range "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
            else
              echo "PR SHA values missing, checking last commit only"
              git rev-parse HEAD~1 >/dev/null 2>&1 && lint_range HEAD~1 HEAD || echo "No previous commit to check"
            fi
          else
            if [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] && [ -n "${{ github.event.after }}" ]; then
              if git cat-file -e ${{ github.event.before }}; then
                echo "Linting push commits from ${{ github.event.before }} to ${{ github.event.after }}"
                lint_range "${{ github.event.before }}" "${{ github.event.after }}"
              else
                echo "Before commit ${{ github.event.before }} not found, checking last commit only"
                git rev-parse HEAD~1 >/dev/null 2>&1 && lint_range HEAD~1 HEAD || echo "First commit, nothing to check"
              fi
            else
              echo "Initial push or empty before SHA, checking last commit only"
              if git rev-parse HEAD~1 > /dev/null 2>&1; then
                lint_range HEAD~1 HEAD
              else
                echo "First commit in the repository, nothing to check"
                exit 0
              fi
            fi
          fi 
